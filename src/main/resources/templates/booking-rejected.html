<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body style="margin:0;background:#f4f6f9;font-family:Arial,sans-serif;">

<table width="100%" style="padding:30px 0;">
    <tr>
        <td align="center">

            <table width="600" style="background:white;border-radius:8px;overflow:hidden">

                <!-- HEADER -->
                <tr>
                    <td style="background:#ef4444;color:white;text-align:center;padding:25px">
                        <h2>FixMate</h2>
                        <p>Your booking request was declined</p>
                    </td>
                </tr>

                <!-- BODY -->
                <tr>
                    <td style="padding:30px">

                        <p>Hello <b th:text="${name}">Customer</b>,</p>

                        <p>Unfortunately, your booking request for the following service was declined.</p>

                        <hr>

                        <p><b>Service:</b> <span th:text="${serviceTitle}"></span></p>

                        <p><b>Reason:</b> <span th:text="${reason}"></span></p>

                        <br>

                        <p>You can try booking another provider through FixMate.</p>

                        <p>We apologize for the inconvenience.</p>

                    </td>
                </tr>

                <!-- FOOTER -->
                <tr>
                    <td style="background:#f5f5f5;padding:20px;text-align:center;font-size:12px;color:#777">
                        © 2026 FixMate
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
