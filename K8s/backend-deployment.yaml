apiVersion: apps/v1
kind: Deployment
metadata:
  name: fixmate-backend
  namespace: fixmate
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: fixmate-backend
  template:
    metadata:
      labels:
        app: fixmate-backend
    spec:
      containers:
        - name: fixmate-backend
          image: janithad/fixmate-backend
          ports:
            - containerPort: 8081

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "400m"
              memory: "512Mi"

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"

            # Database
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_PASSWORD

            # JPA Settings
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: SPRING_JPA_HIBERNATE_DDL_AUTO

            - name: SPRING_JPA_SHOW_SQL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: SPRING_JPA_SHOW_SQL

            - name: SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL

            - name: SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: SPRING_JPA_HIBERNATE_DIALECT

            # Flyway
            - name: SPRING_FLYWAY_LOCATIONS
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: FLYWAY_LOCATIONS

            - name: SPRING_FLYWAY_BASELINE_ON_MIGRATE
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: FLYWAY_BASELINE_ON_MIGRATE

            # JWT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET

            # Server port
            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: SERVER_PORT

            # GCS configuration
            - name: GCP_PROJECT_ID
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: GCP_PROJECT_ID

            - name: GCP_BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: GCP_BUCKET_NAME

            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/secrets/google/key.json

          volumeMounts:
            - name: gcp-storage-key
              mountPath: /var/secrets/google
              readOnly: true

          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8081
            initialDelaySeconds: 150
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8081
            initialDelaySeconds: 200
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6

        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.4
          args:
            - "--private-ip"
            - "--port=5432"
            - "fixmate:asia-south1:fixmate-postgres"
          securityContext:
            runAsNonRoot: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

      volumes:
        - name: gcp-storage-key
          secret:
            secretName: gcp-storage-key